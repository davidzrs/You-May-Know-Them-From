<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You May Know Them From</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-shell">
    <div class="popup-card">
      <div class="popup-header">
        <div class="popup-title">You May Know Them From</div>
        <div class="popup-subtitle">Sync your MyDramaList library</div>
      </div>

      <div class="popup-section">
        <label for="username" class="input-label">MDL username</label>
        <input
          id="username"
          type="text"
          class="text-input"
          placeholder="e.g. kdramafan123"
          autocomplete="off"
        />
      </div>

      <div class="button-row">
        <button id="saveButton" class="secondary-button">Save username</button>
        <button id="syncButton" class="primary-button">Sync watched lists</button>
      </div>

      <div id="status" class="status-text">Ready to sync.</div>

      <div class="popup-footer">
        <a
          class="footer-link footer-link--coffee"
          href="https://buymeacoffee.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="footer-link__icon">☕</span>
          <span>Donate</span>
        </a>

        <a
          class="footer-link footer-link--github"
          href="https://github.com/davidzrs/You-May-Know-Them-From"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
          title="GitHub"
        >
          <span class="footer-link__icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07
              -1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
              0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
            </svg>
          </span>
        </a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
