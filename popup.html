<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You May Know Them From</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-shell">
    <div class="popup-card">
      <div class="popup-header">
        <div>
          <div class="popup-title">You May Know Them From</div>
          <div class="popup-subtitle">Sync your MyDramaList library</div>
        </div>

        <div class="popup-header__actions">
          <button
            id="settingsButton"
            class="icon-button"
            type="button"
            aria-label="Settings"
            title="Settings"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0A1.65 1.65 0 0 0 20.91 10H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="popup-section">
        <label for="username" class="input-label">MDL username</label>
        <input
          id="username"
          type="text"
          class="text-input"
          placeholder="e.g. kdramafan123"
          autocomplete="off"
        />
      </div>

      <div class="button-row">
        <button id="saveButton" class="secondary-button">Save username</button>
        <button id="syncButton" class="primary-button">Sync watched lists</button>
      </div>

      <div class="status-block">
        <div id="status" class="status-text">Ready to sync.</div>
        <div id="lastSynced" class="last-synced-text">Last synced: never</div>
      </div>

      <div class="popup-footer">
        <a
          class="footer-link footer-link--coffee"
          href="https://ko-fi.com/davidzrs"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="footer-link__icon">☕</span>
          <span>Donate</span>
        </a>

        <a
          class="footer-link footer-link--github"
          href="https://github.com/davidzrs/You-May-Know-Them-From"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
          title="GitHub"
        >
          <span class="footer-link__icon" aria-hidden="true">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07
              -1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
              0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
            </svg>
          </span>
        </a>
      </div>

      <div id="settingsOverlay" class="settings-overlay" hidden>
        <button
          id="closeSettingsButton"
          class="icon-button overlay-close-button"
          type="button"
          aria-label="Close settings"
          title="Close settings"
        >
          <span aria-hidden="true">×</span>
        </button>

        <div class="settings-overlay__panel">
          <div class="settings-overlay__header">
            <div class="settings-overlay__title">Settings</div>
          </div>

          <div class="settings-overlay__body">
            <label class="toggle-label">
              <input id="includeStaffCredits" type="checkbox" class="toggle-checkbox" checked />
              <span class="toggle-label__text">Include staff credits</span>
            </label>

            <button id="clearDataButton" class="tertiary-button settings-clear-button" type="button">
              Clear synced data
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="confirmClearOverlay" class="settings-overlay" hidden>
    <button
      id="closeConfirmClearButton"
      class="icon-button overlay-close-button"
      type="button"
      aria-label="Close confirmation"
      title="Close confirmation"
    >
      <span aria-hidden="true">×</span>
    </button>

    <div class="settings-overlay__panel confirm-panel">
      <div class="settings-overlay__header">
        <div class="settings-overlay__title">Clear synced data?</div>
      </div>

      <div class="settings-overlay__body">
        <div class="confirm-text">
          This will remove your saved username, synced titles, and poster cache.
        </div>

        <div class="confirm-subtext">
          You can sync again anytime by entering your username again.
        </div>

        <div class="confirm-actions">
          <button id="cancelClearButton" class="secondary-button" type="button">Cancel</button>
          <button id="confirmClearButton" class="danger-button" type="button">Clear data</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
